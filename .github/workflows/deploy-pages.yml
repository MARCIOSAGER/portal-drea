name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all portals
        run: python scripts/build-all.py

      - name: Prepare Pages directory
        run: |
          mkdir -p _site/coe _site/ssci
          cp packages/portal-coe/dist/Portal_COE_AWM.html _site/coe/index.html
          cp packages/portal-ssci/dist/Portal_PSCI_AWM.html _site/ssci/index.html

      - name: Create landing page
        run: |
          cat > _site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html lang="pt">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Portal DREA — SGA</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
                background: #fafafa;
                color: #18181b;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
              }
              .container {
                text-align: center;
                max-width: 600px;
                padding: 40px 24px;
              }
              .logo { max-width: 280px; margin-bottom: 24px; }
              h1 {
                font-size: 28px;
                font-weight: 700;
                color: #004C7B;
                letter-spacing: -0.02em;
                margin-bottom: 8px;
              }
              .subtitle {
                font-size: 14px;
                color: #71717a;
                margin-bottom: 40px;
              }
              .portals {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
                margin-bottom: 40px;
              }
              .portal-card {
                background: white;
                border: 1px solid #e4e4e7;
                border-radius: 10px;
                padding: 28px 20px;
                text-decoration: none;
                color: #18181b;
                transition: transform 120ms, box-shadow 120ms;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
              }
              .portal-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(0,76,123,0.12);
                border-color: #004C7B;
              }
              .portal-card .icon {
                width: 48px;
                height: 48px;
                background: #004C7B;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 22px;
              }
              .portal-card h2 {
                font-size: 16px;
                font-weight: 600;
                color: #004C7B;
              }
              .portal-card p {
                font-size: 12px;
                color: #71717a;
                line-height: 1.4;
              }
              .footer {
                font-size: 11px;
                color: #a1a1aa;
              }
              .footer a { color: #004C7B; text-decoration: none; }
              @media (max-width: 500px) {
                .portals { grid-template-columns: 1fr; }
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Portal DREA</h1>
              <p class="subtitle">Direcção de Resposta a Emergências Aeroportuárias — SGA</p>
              <div class="portals">
                <a href="coe/" class="portal-card">
                  <div class="icon">🎯</div>
                  <h2>Portal COE</h2>
                  <p>Centro de Operações de Emergência — Coordenação e registo de ocorrências</p>
                </a>
                <a href="ssci/" class="portal-card">
                  <div class="icon">🚒</div>
                  <h2>Portal SSCI</h2>
                  <p>Serviço de Salvamento e Combate a Incêndio — Operações diárias do quartel</p>
                </a>
              </div>
              <div class="footer">
                <p>SGA — Sociedade Gestora de Aeroportos, S.A.</p>
              </div>
            </div>
          </body>
          </html>
          LANDING

      - name: Create service worker
        run: |
          CACHE_VER="portal-drea-$(cat VERSION)-$(git rev-parse --short HEAD)"
          cat > _site/sw.js << SW
          const CACHE_NAME = '${CACHE_VER}';
          const URLS_TO_CACHE = ['./', './coe/', './ssci/'];

          self.addEventListener('install', e => {
            e.waitUntil(
              caches.open(CACHE_NAME).then(cache => cache.addAll(URLS_TO_CACHE))
            );
            self.skipWaiting();
          });

          self.addEventListener('activate', e => {
            e.waitUntil(
              caches.keys().then(keys =>
                Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
              )
            );
            self.clients.claim();
          });

          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(cached => {
                const fetchPromise = fetch(e.request).then(response => {
                  if (response && response.status === 200) {
                    const clone = response.clone();
                    caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
                  }
                  return response;
                }).catch(function() { return cached; });
                return cached || fetchPromise;
              })
            );
          });
          SW

      - name: Add SW registration to portal HTMLs
        run: |
          # Insert SW registration BEFORE the final </body> tag only (not the ones inside JS strings).
          # Use python for precision — sed replaces ALL occurrences which breaks JS strings containing </body>.
          python3 -c "
          import pathlib
          sw_tag = '<script>if(\"serviceWorker\" in navigator){navigator.serviceWorker.register(\"../sw.js\",{scope:\"../\"}).catch(function(){})}</script>'
          for f in ['_site/coe/index.html', '_site/ssci/index.html']:
              p = pathlib.Path(f)
              html = p.read_text(encoding='utf-8')
              # Replace only the LAST </body> (the real one, not the ones inside JS strings)
              idx = html.rfind('</body>')
              if idx >= 0:
                  html = html[:idx] + sw_tag + html[idx:]
              p.write_text(html, encoding='utf-8')
              print(f'{f}: SW injected at position {idx}')
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
